# /nginx.conf

# ==============================================================================
# MediGo Performance-Optimized Nginx Configuration
# ==============================================================================

worker_processes auto;
worker_rlimit_nofile 100000;

events {
    worker_connections 4000;
    use epoll;
    multi_accept on;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # Basic Settings
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    server_tokens   off;
    keepalive_timeout 65;

    # GZIP Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # Proxy Cache Path
    proxy_cache_path /tmp/nginx_cache levels=1:2 keys_zone=medigo_cache:10m max_size=1g inactive=60m use_temp_path=off;

    upstream frontend_upstream {
        server 127.0.0.1:3000;
        keepalive 64;
    }

    upstream backend_upstream {
        server 127.0.0.1:5000;
        keepalive 64;
    }

    server {
        listen 80;
        server_name medigo.example.com;

        # Frontend Next.js Static Assets Caching
        location /_next/static/ {
            proxy_pass http://frontend_upstream;
            proxy_cache medigo_cache;
            proxy_cache_valid 200 365d;
            proxy_cache_use_stale error timeout http_500 http_502 http_503 http_504;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # Frontend Next.js Images Optimization Cache
        location /_next/image {
            proxy_pass http://frontend_upstream;
            proxy_cache medigo_cache;
            proxy_cache_valid 200 7d;
            add_header Cache-Control "public, max-age=604800, stale-while-revalidate=86400";
        }

        # Backend API Routing (Bypass cache for dynamic data)
        location /api/ {
            proxy_pass http://backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            
            # Rate limiting / Timeout hardening
            proxy_read_timeout 60s;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
        }

        # Frontend Application Fallback
        location / {
            proxy_pass http://frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            
            # Short-lived cache for HTML pages
            add_header Cache-Control "public, s-maxage=10, stale-while-revalidate=59";
        }
    }
}
